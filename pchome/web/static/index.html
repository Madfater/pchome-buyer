<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PChome 搶購控制台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
<style>
  :root {
    --bg: #f5f6f8; --card: #ffffff; --text: #1c2330; --muted: #6b7280;
    --border: #e2e5ea; --accent: #2563eb; --accent-text: #ffffff;
    --ok: #16a34a; --warn: #d97706; --err: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12151c; --card: #1c212c; --text: #e5e9f0; --muted: #9aa3b2;
      --border: #2c3342; --accent: #3b82f6; --accent-text: #ffffff;
      --ok: #22c55e; --warn: #f59e0b; --err: #ef4444;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: system-ui, "Noto Sans TC", sans-serif; font-size: 15px;
  }
  header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 18px; margin: 0 auto 0 0; }
  main { max-width: 1100px; margin: 0 auto; padding: 20px; }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    font-size: 13px; border: 1px solid var(--border);
  }
  .badge.ok { color: var(--ok); border-color: var(--ok); }
  .badge.err { color: var(--err); border-color: var(--err); }
  button {
    padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer; font-size: 14px;
  }
  button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  form#add-form {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 18px;
  }
  form#add-form input {
    padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px;
  }
  #pid-input { width: 230px; font-family: ui-monospace, monospace; }
  .hint { color: var(--muted); font-size: 13px; }
  #grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 14px; margin-bottom: 20px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-left: 5px solid var(--gcolor, var(--border));
    border-radius: 12px; padding: 12px 14px; position: relative;
  }
  .card .pid { font-family: ui-monospace, monospace; font-weight: 600; word-break: break-all; }
  .card .sale { color: var(--muted); font-size: 13px; margin: 4px 0 8px; }
  .card .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card .remove {
    position: absolute; top: 8px; right: 8px; border: none; background: none;
    color: var(--muted); font-size: 16px; padding: 2px 6px;
  }
  .status {
    display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 13px;
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
  }
  .status.monitoring, .status.waiting { color: var(--warn); border-color: var(--warn); }
  .status.forsale, .status.carted { color: var(--ok); border-color: var(--ok); }
  .status.soldout, .status.failed { color: var(--err); border-color: var(--err); }
  .info { color: var(--muted); font-size: 13px; }
  h2 { font-size: 15px; color: var(--muted); margin: 18px 0 8px; }
  .job {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border);
    border-left: 5px solid var(--gcolor, var(--border));
    border-radius: 10px; padding: 9px 12px; margin-bottom: 8px; font-size: 14px;
  }
  .job .progress { color: var(--muted); font-size: 13px; flex: 1; min-width: 180px; }
  #log {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; height: 260px; overflow-y: auto;
    font-family: ui-monospace, monospace; font-size: 12.5px; white-space: pre-wrap;
  }
  #log .gtag { font-weight: 600; }
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--err); color: #fff; padding: 8px 18px; border-radius: 8px;
    display: none; z-index: 10;
  }
</style>
</head>
<body>
<header>
  <h1>PChome 搶購控制台</h1>
  <span id="session-badge" class="badge">…</span>
  <button id="btn-login">登入</button>
  <button id="btn-login-save" style="display:none">完成登入，儲存 session</button>
  <button id="btn-start" class="primary">全部啟動</button>
</header>

<main>
  <form id="add-form">
    <input id="pid-input" placeholder="商品編號 DGCQ39-A900JESMM" required>
    <input id="time-input" type="datetime-local" step="60">
    <button type="submit" class="primary">新增商品</button>
    <span class="hint">開賣時間相同的商品會一起結帳；留空表示立即開始監控。</span>
  </form>

  <div id="grid"></div>

  <h2>結帳組任務</h2>
  <div id="jobs"><span class="hint">尚未啟動任何任務</span></div>

  <h2>日誌</h2>
  <div id="log"></div>
</main>

<div id="toast"></div>

<script>
const GROUP_COLORS = ['#2563eb', '#d97706', '#16a34a', '#db2777', '#7c3aed', '#0d9488'];
const PRODUCT_LABEL = {
  idle: '待命', waiting: '等待中', monitoring: '監控中', forsale: '開賣！',
  soldout: '售完', carted: '已加車', failed: '失敗',
};
const JOB_LABEL = {
  running: '執行中', awaiting_payment: '請在瀏覽器完成付款', success: '完成',
  sold_out: '售完', cart_failed: '加車失敗', session_expired: 'session 已過期',
  not_logged_in: '未登入', cancelled: '已結束', failed: '錯誤',
};

let S = { logged_in: false, login_running: false, products: [], jobs: {} };
const groupColor = (() => {
  const assigned = {};
  let next = 0;
  return gid => {
    if (!(gid in assigned)) assigned[gid] = GROUP_COLORS[next++ % GROUP_COLORS.length];
    return assigned[gid];
  };
})();

const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 4000);
}

async function api(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

async function refresh() {
  S = await api('GET', '/api/state');
  render();
}

function render() {
  // header
  $('session-badge').textContent = S.logged_in ? '已登入' : '未登入';
  $('session-badge').className = 'badge ' + (S.logged_in ? 'ok' : 'err');
  $('btn-login').style.display = S.login_running ? 'none' : '';
  $('btn-login-save').style.display = S.login_running ? '' : 'none';

  // 卡片網格
  const grid = $('grid');
  grid.innerHTML = '';
  if (!S.products.length) {
    grid.innerHTML = '<span class="hint">尚未新增商品，先在上方輸入商品編號與開賣時間。</span>';
  }
  for (const p of S.products) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--gcolor', groupColor(p.gid));
    const status = PRODUCT_LABEL[p.status] || p.status;
    card.innerHTML = `
      <button class="remove" title="移除" ${p.job_running ? 'disabled' : ''}>✕</button>
      <div class="pid"></div>
      <div class="sale"></div>
      <div class="row">
        <span class="status ${p.status}">${status}</span>
        <span class="info"></span>
      </div>`;
    card.querySelector('.pid').textContent = p.id;
    card.querySelector('.sale').textContent = p.sale_time ? `開賣 ${p.sale_time}` : '立即監控';
    card.querySelector('.info').textContent = p.info || '';
    card.querySelector('.remove').onclick = () =>
      api('DELETE', `/api/products/${encodeURIComponent(p.id)}`)
        .then(st => { S = st; render(); })
        .catch(e => toast(e.message));
    grid.appendChild(card);
  }

  // 結帳組任務列
  const jobsEl = $('jobs');
  const gids = Object.keys(S.jobs);
  jobsEl.innerHTML = gids.length ? '' : '<span class="hint">尚未啟動任何任務</span>';
  for (const gid of gids) {
    const j = S.jobs[gid];
    const row = document.createElement('div');
    row.className = 'job';
    row.style.setProperty('--gcolor', groupColor(gid));
    row.innerHTML = `
      <strong>${j.sale_time || '立即'}</strong>
      <span class="status">${JOB_LABEL[j.status] || j.status}</span>
      <span class="progress" id="progress-${gid}"></span>
      <button ${j.alive ? '' : 'disabled'}>${j.status === 'awaiting_payment' ? '結束（關閉瀏覽器）' : '停止'}</button>`;
    row.querySelector('.progress').textContent = j.progress || '';
    row.querySelector('button').onclick = () =>
      api('POST', `/api/jobs/${encodeURIComponent(gid)}/stop`).catch(e => toast(e.message));
    jobsEl.appendChild(row);
  }
}

function appendLog(gid, msg) {
  const el = $('log');
  const line = document.createElement('div');
  const tag = document.createElement('span');
  tag.className = 'gtag';
  tag.style.color = groupColor(gid);
  tag.textContent = `[${gid}] `;
  line.appendChild(tag);
  line.appendChild(document.createTextNode(msg));
  el.appendChild(line);
  while (el.childNodes.length > 500) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

// ---- 事件繫結 ----

$('add-form').onsubmit = async e => {
  e.preventDefault();
  const saleTime = $('time-input').value ? $('time-input').value.replace('T', ' ') : '';
  try {
    S = await api('POST', '/api/products', { id: $('pid-input').value, sale_time: saleTime });
    $('pid-input').value = '';
    render();
  } catch (err) { toast(err.message); }
};

$('btn-login').onclick = async () => {
  try {
    await api('POST', '/api/login/start');
    S.login_running = true;
    render();
    toast('已開啟瀏覽器，請在視窗中完成登入後按「完成登入」');
  } catch (err) { toast(err.message); }
};

$('btn-login-save').onclick = () =>
  api('POST', '/api/login/save').catch(e => toast(e.message));

$('btn-start').onclick = async () => {
  try {
    const r = await api('POST', '/api/jobs/start');
    if (!r.started.length) toast('所有分組皆已在執行中');
    await refresh();
  } catch (err) { toast(err.message); }
};

// ---- SSE ----

const es = new EventSource('/api/events');
es.onmessage = ev => {
  const e = JSON.parse(ev.data);
  if (e.type === 'log') {
    appendLog(e.gid, e.msg);
  } else if (e.type === 'progress') {
    const el = $(`progress-${e.gid}`);
    if (el) el.textContent = e.msg;
  } else if (e.type === 'product') {
    const p = S.products.find(x => x.id === e.pid);
    if (p) { p.status = e.status; p.info = e.info; render(); }
  } else if (e.type === 'job' || e.type === 'login') {
    refresh();
  }
};

refresh().catch(e => toast(e.message));
setInterval(() => refresh().catch(() => {}), 60000);
</script>
</body>
</html>
