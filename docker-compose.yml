services:
  pchome-buyer:
    build: .
    # 控制台本身無認證，預設只綁 host 的 127.0.0.1；
    # 要對外請改成 "8787:8787" 並以反向代理（basic auth / VPN）保護
    ports:
      - "127.0.0.1:8787:8787"
    env_file:
      - path: .env # CVC / AUTO_PAY（遠端 headless 部署建議 AUTO_PAY=true）
        required: false
    environment:
      - TZ=Asia/Taipei # 開賣時間以此時區解析
    volumes:
      - ./data:/data # auth_state.json / products.json / checkouts.json
    init: true # 回收 Chromium 子行程
    shm_size: 1gb # Chromium 需要較大的 /dev/shm
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/api/state', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      start_period: 15s
