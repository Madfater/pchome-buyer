name: CI/CD

on:
  push:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
        working-directory: backend
      - run: uv run pytest
        working-directory: backend
      - run: uv run --with pyright pyright src/pchome
        working-directory: backend
      - run: uv run ruff format --check .
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npx prettier --check .
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run test
        working-directory: frontend

  deploy:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dockhand redeploy
        env:
          DOCKHAND_WEBHOOK_URL: ${{ secrets.DOCKHAND_WEBHOOK_URL }}
          DOCKHAND_WEBHOOK_SECRET: ${{ secrets.DOCKHAND_WEBHOOK_SECRET }}
        run: |
          if [ -z "$DOCKHAND_WEBHOOK_URL" ] || [ -z "$DOCKHAND_WEBHOOK_SECRET" ]; then
            echo "::error::DOCKHAND_WEBHOOK_URL or DOCKHAND_WEBHOOK_SECRET repo secret is not set"
            exit 1
          fi
          PAYLOAD='{}'
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$DOCKHAND_WEBHOOK_SECRET" | awk '{print $NF}')"
          RESPONSE=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST "$DOCKHAND_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD")
          echo "HTTP status: $RESPONSE"
          echo "Response body: $(cat /tmp/response.txt)"
          if [ "$RESPONSE" -ge 400 ]; then
            exit 1
          fi
